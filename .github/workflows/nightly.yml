name: Nightly CI

on:
  schedule:
    # 2:00 AM UTC daily (offset from Coverity's 0:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  trigger:
    name: Trigger All CI Workflows
    runs-on: ubuntu-latest
    if: github.repository == 'aidangarske/wolfCOSE'

    outputs:
      trigger-time: ${{ steps.dispatch.outputs.trigger-time }}

    steps:
    - name: Dispatch all workflows
      id: dispatch
      uses: actions/github-script@v7
      with:
        script: |
          const triggerTime = new Date().toISOString();
          core.setOutput('trigger-time', triggerTime);

          const workflows = [
            'build-test.yml',
            'codespell.yml',
            'comprehensive-tests.yml',
            'coverage.yml',
            'examples.yml',
            'minimal-build.yml',
            'misra-2012.yml',
            'misra-2023.yml',
            'multi-compiler.yml',
            'sanitizer.yml',
            'scenarios.yml',
            'static-analysis.yml',
            'wolfssl-versions.yml',
          ];

          const results = [];
          for (const workflow of workflows) {
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow,
                ref: 'master',
              });
              results.push(`  OK  ${workflow}`);
              core.info(`Triggered ${workflow}`);
            } catch (error) {
              results.push(`  FAIL  ${workflow}: ${error.message}`);
              core.warning(`Failed to trigger ${workflow}: ${error.message}`);
            }
          }

          core.info('--- Dispatch Summary ---');
          for (const r of results) {
            core.info(r);
          }

  report:
    name: Collect Results & Email Report
    runs-on: ubuntu-latest
    needs: trigger
    if: github.repository == 'aidangarske/wolfCOSE'

    steps:
    - name: Wait for workflows and collect results
      id: collect
      uses: actions/github-script@v7
      with:
        script: |
          const triggerTime = '${{ needs.trigger.outputs.trigger-time }}';
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          const workflowFiles = [
            'build-test.yml',
            'codespell.yml',
            'comprehensive-tests.yml',
            'coverage.yml',
            'examples.yml',
            'minimal-build.yml',
            'misra-2012.yml',
            'misra-2023.yml',
            'multi-compiler.yml',
            'sanitizer.yml',
            'scenarios.yml',
            'static-analysis.yml',
            'wolfssl-versions.yml',
          ];

          // Map workflow file to its ID
          const workflowIds = {};
          for (const file of workflowFiles) {
            try {
              const { data } = await github.rest.actions.getWorkflow({
                owner, repo, workflow_id: file,
              });
              workflowIds[file] = data.id;
            } catch (e) {
              core.warning(`Could not resolve workflow ID for ${file}: ${e.message}`);
            }
          }

          // Poll until all workflows complete or timeout (3 hours)
          const maxWaitMs = 3 * 60 * 60 * 1000;
          const pollIntervalMs = 120 * 1000; // 2 minutes
          const startTime = Date.now();
          let allDone = false;

          while (!allDone && (Date.now() - startTime) < maxWaitMs) {
            await new Promise(r => setTimeout(r, pollIntervalMs));
            allDone = true;

            for (const file of workflowFiles) {
              const wfId = workflowIds[file];
              if (!wfId) continue;

              try {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner, repo, workflow_id: wfId,
                  event: 'workflow_dispatch',
                  created: `>=${triggerTime.split('T')[0]}`,
                  per_page: 5,
                });

                // Find the run triggered after our dispatch time
                const run = data.workflow_runs.find(r =>
                  new Date(r.created_at) >= new Date(triggerTime)
                );

                if (!run || run.status !== 'completed') {
                  allDone = false;
                }
              } catch (e) {
                core.warning(`Poll error for ${file}: ${e.message}`);
                allDone = false;
              }
            }

            if (!allDone) {
              const elapsed = Math.round((Date.now() - startTime) / 60000);
              core.info(`Waiting... ${elapsed} min elapsed`);
            }
          }

          // Collect final results
          const results = [];
          let passed = 0;
          let failed = 0;
          let unknown = 0;

          for (const file of workflowFiles) {
            const wfId = workflowIds[file];
            if (!wfId) {
              results.push({ name: file, status: 'unknown', conclusion: 'unknown', url: '', duration: '' });
              unknown++;
              continue;
            }

            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: wfId,
                event: 'workflow_dispatch',
                created: `>=${triggerTime.split('T')[0]}`,
                per_page: 5,
              });

              const run = data.workflow_runs.find(r =>
                new Date(r.created_at) >= new Date(triggerTime)
              );

              if (run) {
                const duration = run.updated_at && run.created_at
                  ? Math.round((new Date(run.updated_at) - new Date(run.created_at)) / 60000)
                  : 0;

                results.push({
                  name: file.replace('.yml', ''),
                  status: run.status,
                  conclusion: run.conclusion || 'in_progress',
                  url: run.html_url,
                  duration: `${duration}m`,
                });

                if (run.conclusion === 'success') passed++;
                else if (run.conclusion === 'failure') failed++;
                else unknown++;
              } else {
                results.push({ name: file.replace('.yml', ''), status: 'not_found', conclusion: 'unknown', url: '', duration: '' });
                unknown++;
              }
            } catch (e) {
              results.push({ name: file.replace('.yml', ''), status: 'error', conclusion: 'unknown', url: '', duration: '' });
              unknown++;
            }
          }

          // Build date string
          const now = new Date();
          const dateStr = now.toISOString().split('T')[0];

          // Build subject
          let subject;
          if (failed === 0 && unknown === 0) {
            subject = `wolfCOSE Nightly — ${dateStr} — All Green`;
          } else if (failed > 0) {
            subject = `wolfCOSE Nightly — ${dateStr} — ${failed}/${results.length} Failed`;
          } else {
            subject = `wolfCOSE Nightly — ${dateStr} — ${passed} Passed, ${unknown} Unknown`;
          }

          // Build HTML email body (styled like fenrir email_notify.py)
          let html = `
          <html>
          <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 700px; margin: 0 auto; color: #333;">

          <h2 style="border-bottom: 2px solid #1a73e8; padding-bottom: 8px;">
              wolfCOSE Nightly CI Report — ${dateStr}
          </h2>

          <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
              <tr>
                  <td style="padding: 8px; font-weight: bold;">Total workflows:</td>
                  <td style="padding: 8px;">${results.length}</td>
              </tr>
              <tr>
                  <td style="padding: 8px; font-weight: bold; color: #2e7d32;">Passed:</td>
                  <td style="padding: 8px; color: #2e7d32;">${passed}</td>
              </tr>
              <tr>
                  <td style="padding: 8px; font-weight: bold; color: #d32f2f;">Failed:</td>
                  <td style="padding: 8px; color: #d32f2f;">${failed}</td>
              </tr>`;

          if (unknown > 0) {
            html += `
              <tr>
                  <td style="padding: 8px; font-weight: bold; color: #f57c00;">Unknown/In Progress:</td>
                  <td style="padding: 8px; color: #f57c00;">${unknown}</td>
              </tr>`;
          }

          html += `
          </table>

          <h3>Workflow Results</h3>
          <table style="width: 100%; border-collapse: collapse; margin: 8px 0;">
              <tr style="background: #f5f5f5;">
                  <th style="padding: 8px; text-align: left; border-bottom: 1px solid #ddd;">Workflow</th>
                  <th style="padding: 8px; text-align: left; border-bottom: 1px solid #ddd;">Status</th>
                  <th style="padding: 8px; text-align: left; border-bottom: 1px solid #ddd;">Duration</th>
              </tr>`;

          for (const r of results) {
            let statusColor, statusText;
            if (r.conclusion === 'success') {
              statusColor = '#2e7d32';
              statusText = 'PASS';
            } else if (r.conclusion === 'failure') {
              statusColor = '#d32f2f';
              statusText = 'FAIL';
            } else if (r.conclusion === 'cancelled') {
              statusColor = '#757575';
              statusText = 'CANCELLED';
            } else {
              statusColor = '#f57c00';
              statusText = r.conclusion.toUpperCase();
            }

            const nameLink = r.url
              ? `<a href="${r.url}" style="color: #1a73e8;">${r.name}</a>`
              : r.name;

            html += `
              <tr>
                  <td style="padding: 6px 8px; border-bottom: 1px solid #eee;">${nameLink}</td>
                  <td style="padding: 6px 8px; border-bottom: 1px solid #eee; color: ${statusColor}; font-weight: bold;">${statusText}</td>
                  <td style="padding: 6px 8px; border-bottom: 1px solid #eee;">${r.duration}</td>
              </tr>`;
          }

          html += `
          </table>

          <hr style="margin: 24px 0; border: none; border-top: 1px solid #ddd;">
          <p style="color: #666; font-size: 12px;">
              <a href="https://github.com/${owner}/${repo}/actions">View All Runs on GitHub</a>
          </p>
          </body>
          </html>`;

          // Set outputs
          core.setOutput('subject', subject);
          core.setOutput('body', html);
          core.setOutput('passed', passed.toString());
          core.setOutput('failed', failed.toString());

          // Job summary
          let summary = `## Nightly CI Report — ${dateStr}\n\n`;
          summary += `| Workflow | Status | Duration |\n|---|---|---|\n`;
          for (const r of results) {
            const icon = r.conclusion === 'success' ? '✅' : r.conclusion === 'failure' ? '❌' : '⚠️';
            const link = r.url ? `[${r.name}](${r.url})` : r.name;
            summary += `| ${link} | ${icon} ${r.conclusion} | ${r.duration} |\n`;
          }
          await core.summary.addRaw(summary).write();

    - name: Send email report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.FENRIR_SMTP_HOST }}
        server_port: ${{ secrets.FENRIR_SMTP_PORT }}
        username: ${{ secrets.FENRIR_SMTP_USERNAME }}
        password: ${{ secrets.FENRIR_SMTP_PASSWORD }}
        from: ${{ secrets.FENRIR_EMAIL_FROM }}
        to: ${{ secrets.COVERITY_SCAN_EMAIL }}
        subject: ${{ steps.collect.outputs.subject }}
        html_body: ${{ steps.collect.outputs.body }}
