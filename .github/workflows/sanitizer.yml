name: Sanitizer

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan:
    name: ASan (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool

    - name: Cache wolfSSL (ASan)
      id: cache-wolfssl-asan
      uses: actions/cache@v4
      with:
        path: ~/wolfssl-asan
        key: wolfssl-asan-v3

    - name: Build wolfSSL with ASan
      if: steps.cache-wolfssl-asan.outputs.cache-hit != 'true'
      run: |
        cd ~
        git clone --depth 1 https://github.com/wolfSSL/wolfssl.git wolfssl-asan-src
        cd wolfssl-asan-src
        ./autogen.sh
        CFLAGS="-fsanitize=address -fno-omit-frame-pointer" \
        LDFLAGS="-fsanitize=address" \
        ./configure --enable-ecc --enable-ed25519 --enable-ed448 \
                    --enable-curve25519 --enable-aesgcm --enable-aesccm \
                    --enable-sha384 --enable-sha512 --enable-keygen \
                    --enable-rsapss --enable-chacha --enable-poly1305 \
                    --enable-dilithium \
                    --prefix=$HOME/wolfssl-asan
        make -j$(nproc)
        make install

    - name: Build and test wolfCOSE with ASan
      run: |
        export WOLFSSL_DIR=$HOME/wolfssl-asan
        export LD_LIBRARY_PATH=$WOLFSSL_DIR/lib
        ASAN_FLAGS="-fsanitize=address -fno-omit-frame-pointer"
        make clean
        make CFLAGS="-std=c99 -O1 -g -Wall -Wextra -Wpedantic $ASAN_FLAGS -I./include -I$WOLFSSL_DIR/include" \
             LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl $ASAN_FLAGS"
        make test CFLAGS="-std=c99 -O1 -g -Wall -Wextra -Wpedantic $ASAN_FLAGS -I./include -I$WOLFSSL_DIR/include" \
                  LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl $ASAN_FLAGS"
        make tool-test CFLAGS="-std=c99 -O1 -g -Wall -Wextra -Wpedantic $ASAN_FLAGS -I./include -I$WOLFSSL_DIR/include" \
                       LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl $ASAN_FLAGS"
        make demo CFLAGS="-std=c99 -O1 -g -Wall -Wextra -Wpedantic $ASAN_FLAGS -I./include -I$WOLFSSL_DIR/include" \
                  LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl $ASAN_FLAGS"
