name: wolfSSL Version Matrix

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Resolve the latest -stable wolfSSL tag at run time so we don't have to
  # bump this workflow every release. Floor (v5.8.0) and master are fixed:
  # v5.8.0 is the first release with the public wc_ForceZero symbol and the
  # current set of FIPS-204 final ML-DSA APIs wolfCOSE depends on; master
  # surfaces upstream drift on the nightly run.
  discover-versions:
    name: Resolve wolfSSL version matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      latest-stable: ${{ steps.set-matrix.outputs.latest-stable }}
    steps:
      - name: Resolve latest -stable wolfSSL tag
        id: set-matrix
        run: |
          set -euo pipefail
          # List remote v*-stable tags, version-sort, take the highest.
          # Equivalent to `git tag -l 'v*-stable' | sort -V | tail -1` in a
          # local clone, but avoids cloning just to read tag names.
          LATEST=$(git ls-remote --tags --refs https://github.com/wolfSSL/wolfssl.git 'v*-stable' \
                     | awk -F/ '{print $NF}' | sort -V | tail -n 1)
          if [ -z "${LATEST:-}" ]; then
            echo "::error::Could not resolve latest wolfSSL -stable tag from remote"
            exit 1
          fi
          echo "Latest stable wolfSSL: $LATEST"
          echo "latest-stable=$LATEST" >> "$GITHUB_OUTPUT"
          MATRIX=$(jq -nc --arg latest "$LATEST" '{
            include: [
              {"wolfssl-version":"v5.8.0-stable","wolfssl-ref":"v5.8.0-stable","cache-key":"wolfssl-version-v5.8.0-v1"},
              {"wolfssl-version":$latest,"wolfssl-ref":$latest,"cache-key":("wolfssl-version-" + $latest + "-v1")},
              {"wolfssl-version":"master","wolfssl-ref":"master","cache-key":""}
            ]
          }')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  wolfssl-version-test:
    name: wolfSSL ${{ matrix.wolfssl-version }}
    needs: discover-versions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-versions.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool

    # Cache stable versions only — master must always rebuild to catch regressions
    - name: Cache wolfSSL (${{ matrix.wolfssl-version }})
      if: matrix.wolfssl-version != 'master'
      id: cache-wolfssl
      uses: actions/cache@v4
      with:
        path: ~/wolfssl-install
        key: ${{ matrix.cache-key }}

    - name: Build wolfSSL (${{ matrix.wolfssl-version }})
      if: matrix.wolfssl-version == 'master' || steps.cache-wolfssl.outputs.cache-hit != 'true'
      run: |
        cd ~
        git clone --depth 1 --branch ${{ matrix.wolfssl-ref }} \
            https://github.com/wolfSSL/wolfssl.git
        cd wolfssl
        ./autogen.sh
        ./configure --enable-ecc --enable-ed25519 --enable-ed448 \
                    --enable-curve25519 --enable-curve448 \
                    --enable-aesgcm --enable-aesccm --enable-aescbc \
                    --enable-sha384 --enable-sha512 \
                    --enable-keygen --enable-hkdf --enable-aeskeywrap \
                    --enable-chacha --enable-poly1305 \
                    --enable-dilithium --enable-rsapss \
                    --prefix=$HOME/wolfssl-install
        make -j$(nproc)
        make install

    - name: Build wolfCOSE
      run: |
        export WOLFSSL_DIR=$HOME/wolfssl-install
        make CFLAGS="-std=c11 -Os -Wall -Wextra -Wpedantic -Wshadow -Wconversion -I./include -I$WOLFSSL_DIR/include" \
             LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl"

    - name: Run unit tests
      run: |
        export WOLFSSL_DIR=$HOME/wolfssl-install
        export LD_LIBRARY_PATH=$WOLFSSL_DIR/lib
        make test CFLAGS="-std=c11 -Os -Wall -Wextra -Wpedantic -Wshadow -Wconversion -I./include -I$WOLFSSL_DIR/include" \
                  LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl"

    - name: Run tool round-trip test
      run: |
        export WOLFSSL_DIR=$HOME/wolfssl-install
        export LD_LIBRARY_PATH=$WOLFSSL_DIR/lib
        make tool-test CFLAGS="-std=c11 -Os -Wall -Wextra -Wpedantic -Wshadow -Wconversion -I./include -I$WOLFSSL_DIR/include" \
                       LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl"

    - name: wolfSSL version info
      if: always()
      run: |
        echo "=== wolfSSL Version ==="
        echo "Ref: ${{ matrix.wolfssl-ref }}"
        if [ -f ~/wolfssl-install/include/wolfssl/version.h ]; then
          grep LIBWOLFSSL_VERSION_STRING ~/wolfssl-install/include/wolfssl/version.h || true
        fi
