name: Comprehensive Tests

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  comprehensive:
    name: Algorithm Matrix Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool

    - name: Cache wolfSSL
      id: cache-wolfssl
      uses: actions/cache@v4
      with:
        path: ~/wolfssl-install
        key: wolfssl-ubuntu-latest-comprehensive-v1

    - name: Build wolfSSL
      if: steps.cache-wolfssl.outputs.cache-hit != 'true'
      run: |
        cd ~
        git clone --depth 1 https://github.com/wolfSSL/wolfssl.git
        cd wolfssl
        ./autogen.sh
        ./configure --enable-ecc --enable-ed25519 --enable-ed448 \
                    --enable-curve25519 --enable-aesgcm --enable-aesccm \
                    --enable-sha384 --enable-sha512 --enable-keygen \
                    --enable-rsapss --enable-chacha --enable-poly1305 \
                    --enable-dilithium --enable-hkdf --enable-aeskeywrap \
                    --prefix=$HOME/wolfssl-install
        make -j$(nproc)
        make install

    - name: Build wolfCOSE
      run: |
        export WOLFSSL_DIR=$HOME/wolfssl-install
        make CFLAGS="-std=c99 -Os -Wall -Wextra -Wpedantic -Wshadow -Wconversion -fstack-usage -I./include -I$WOLFSSL_DIR/include" \
             LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl"

    - name: Run comprehensive tests
      run: |
        export WOLFSSL_DIR=$HOME/wolfssl-install
        export LD_LIBRARY_PATH=$WOLFSSL_DIR/lib
        make comprehensive CFLAGS="-std=c99 -Os -Wall -Wextra -Wpedantic -Wshadow -Wconversion -fstack-usage -I./include -I$WOLFSSL_DIR/include" \
                           LDFLAGS="-L$WOLFSSL_DIR/lib -lwolfssl"

    - name: Test Summary
      if: always()
      run: |
        echo "=== Comprehensive Test Summary ==="
        echo "Tests cover all algorithm combinations for:"
        echo "  - COSE_Sign1 and COSE_Sign (multi-signer)"
        echo "  - COSE_Encrypt0 and COSE_Encrypt (multi-recipient)"
        echo "  - COSE_Mac0 and COSE_Mac (multi-recipient)"
        echo "  - Error handling and edge cases"
